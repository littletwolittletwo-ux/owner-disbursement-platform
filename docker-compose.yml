services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-owner_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-owner_app_password}
      POSTGRES_DB: ${POSTGRES_DB:-owner_disbursements}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-owner_app} -d ${POSTGRES_DB:-owner_disbursements}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgres://owner_app:owner_app_password@postgres:5432/owner_disbursements}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
